name: Deploy Capacity Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_LOCATION: 'westus2'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install production dependencies
        run: npm ci --production

      - name: Create deployment package
        run: |
          mkdir -p deployment
          cp package.json deployment/
          cp package-lock.json deployment/ 2>/dev/null || true
          cp server.js deployment/
          cp app.js deployment/
          cp index.html deployment/
          cp styles.css deployment/
          cp web.config deployment/ 2>/dev/null || true
          cp -r node_modules deployment/ 2>/dev/null || true
          cp -r react deployment/ 2>/dev/null || true
          cp -r src deployment/ 2>/dev/null || true
          cp -r sql deployment/ 2>/dev/null || true
          cp -r docs deployment/ 2>/dev/null || true
          cp -r infra deployment/ 2>/dev/null || true
          cp -r tools deployment/ 2>/dev/null || true
          cp -r scripts deployment/ 2>/dev/null || true
          cd deployment
          zip -r ../deployment.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deployment.zip
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          slot-name: 'production'

      - name: Bootstrap SQL Database for Managed Identity
        shell: pwsh
        run: |
          # Extract SQL server and database names from resource naming pattern
          # Pattern: app-capdash-{environment}-{workloadSuffix}
          $appName = "${{ env.AZURE_WEBAPP_NAME }}"
          
          # Parse naming convention: app-capdash-PROD-PROD01
          $parts = $appName -split '-'
          $environment = $parts[2]  # 'prod'
          $workloadSuffix = $parts[3]  # 'prod01'
          
          $sqlServerName = "sql-capdash-$environment-$workloadSuffix"
          $sqlDatabaseName = "sqldb-capdash-$environment"
          
          Write-Host "Bootstrapping SQL Database..."
          Write-Host "  SQL Server: $sqlServerName"
          Write-Host "  Database: $sqlDatabaseName"
          
          # Execute bootstrap script
          & ./scripts/bootstrap-sql-managed-identity.ps1 
            -AppServiceName "${{ env.AZURE_WEBAPP_NAME }}" 
            -SqlServerName $sqlServerName 
            -SqlDatabaseName $sqlDatabaseName 
            -ResourceGroup "${{ env.AZURE_RESOURCE_GROUP }}" 
            -SubscriptionId "${{ env.AZURE_SUBSCRIPTION_ID }}"

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }}
          echo "App restarted successfully"

      - name: Verify deployment
        run: |
          echo "Deployment completed successfully"
          echo "App URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "SQL managed identity configured and app restarted"

  deploy-manual:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install production dependencies
        run: npm ci --production

      - name: Run tests
        run: npm test

      - name: Create deployment package
        run: |
          mkdir -p deployment
          cp package.json deployment/
          cp package-lock.json deployment/ 2>/dev/null || true
          cp server.js deployment/
          cp app.js deployment/
          cp index.html deployment/
          cp styles.css deployment/
          cp web.config deployment/ 2>/dev/null || true
          cp -r node_modules deployment/ 2>/dev/null || true
          cp -r react deployment/ 2>/dev/null || true
          cp -r src deployment/ 2>/dev/null || true
          cp -r sql deployment/ 2>/dev/null || true
          cp -r docs deployment/ 2>/dev/null || true
          cp -r infra deployment/ 2>/dev/null || true
          cp -r tools deployment/ 2>/dev/null || true
          cp -r scripts deployment/ 2>/dev/null || true
          cd deployment
          zip -r ../deployment.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deployment.zip
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          slot-name: 'production'

      - name: Bootstrap SQL Database for Managed Identity
        shell: pwsh
        run: |
          # Extract SQL server and database names from resource naming pattern
          # Pattern: app-capdash-{environment}-{workloadSuffix}
          $appName = "${{ env.AZURE_WEBAPP_NAME }}"
          
          # Parse naming convention: app-capdash-PROD-PROD01
          $parts = $appName -split '-'
          $environment = $parts[2]  # 'prod'
          $workloadSuffix = $parts[3]  # 'prod01'
          
          $sqlServerName = "sql-capdash-$environment-$workloadSuffix"
          $sqlDatabaseName = "sqldb-capdash-$environment"
          
          Write-Host "Bootstrapping SQL Database..."
          Write-Host "  SQL Server: $sqlServerName"
          Write-Host "  Database: $sqlDatabaseName"
          
          # Execute bootstrap script
          & ./scripts/bootstrap-sql-managed-identity.ps1 
            -AppServiceName "${{ env.AZURE_WEBAPP_NAME }}" 
            -SqlServerName $sqlServerName 
            -SqlDatabaseName $sqlDatabaseName 
            -ResourceGroup "${{ env.AZURE_RESOURCE_GROUP }}" 
            -SubscriptionId "${{ env.AZURE_SUBSCRIPTION_ID }}"

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }}
          echo "App restarted successfully"

      - name: Post-deployment verification
        run: |
          echo "Manual deployment to ${{ github.event.inputs.environment }} completed"
          echo "App URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "SQL managed identity configured and app restarted"
