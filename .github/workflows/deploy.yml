          cp app.js deployment/
          cp index.html deployment/
          cp styles.css deployment/
          cp web.config deployment/ 2>/dev/null || true
          cp -r node_modules deployment/ 2>/dev/null || true
          cp -r react deployment/ 2>/dev/null || true
          cp -r src deployment/ 2>/dev/null || true
          cp -r sql deployment/ 2>/dev/null || true
          cp -r docs deployment/ 2>/dev/null || true
          cp -r infra deployment/ 2>/dev/null || true
