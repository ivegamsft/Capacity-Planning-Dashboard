name: Deploy Capacity Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_WEBAPP_NAME: 'app-capdash-prod-prod01'
  AZURE_LOCATION: 'westus2'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install production dependencies
        run: npm ci --production

      - name: Create deployment package
        run: |
          mkdir -p deployment
          cp package.json deployment/
          cp package-lock.json deployment/ 2>/dev/null || true
          cp server.js deployment/
          cp app.js deployment/
          cp index.html deployment/
          cp styles.css deployment/
          cp web.config deployment/ 2>/dev/null || true
          cp -r node_modules deployment/ 2>/dev/null || true
          cp -r react deployment/ 2>/dev/null || true
          cp -r src deployment/ 2>/dev/null || true
          cp -r sql deployment/ 2>/dev/null || true
          cp -r docs deployment/ 2>/dev/null || true
          cp -r infra deployment/ 2>/dev/null || true
          cp -r tools deployment/ 2>/dev/null || true
          cp -r scripts deployment/ 2>/dev/null || true
          cd deployment
          zip -r ../deployment.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deployment.zip
          resource-group-name: ${{ env.AZURE_RESOURCE_GROUP }}

      - name: Install sqlcmd
        run: |
          # Install go-sqlcmd (supports ActiveDirectoryDefault auth for CI/CD)
          VERSION=$(curl -sSL https://api.github.com/repos/microsoft/go-sqlcmd/releases/latest \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['tag_name'])")
          curl -sSL "https://github.com/microsoft/go-sqlcmd/releases/download/${VERSION}/sqlcmd-linux-amd64.tar.bz2" \
            | sudo tar -xj -C /usr/local/bin sqlcmd
          sqlcmd --version

      - name: Open SQL firewall for deployment
        run: |
          SQL_SERVER="sql-capdash-prod-prod01"
          RUNNER_IP=$(curl -sSL https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          az sql server update \
            --name $SQL_SERVER \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --set publicNetworkAccess=Enabled \
            --output none
          az sql server firewall-rule create \
            --name github-actions-temp \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server $SQL_SERVER \
            --start-ip-address $RUNNER_IP \
            --end-ip-address $RUNNER_IP \
            --output none
          echo "✓ SQL firewall opened for $RUNNER_IP"

      - name: Bootstrap SQL Database for Managed Identity
        shell: pwsh
        run: |
          # Extract SQL server and database names from resource naming pattern
          # Pattern: app-capdash-{environment}-{workloadSuffix}
          $appName = "${{ env.AZURE_WEBAPP_NAME }}"
          
          # Parse naming convention: app-capdash-PROD-PROD01
          $parts = $appName -split '-'
          $environment = $parts[2]  # 'prod'
          $workloadSuffix = $parts[3]  # 'prod01'
          
          $sqlServerName = "sql-capdash-$environment-$workloadSuffix"
          $sqlDatabaseName = "sqldb-capdash-$environment"
          
          Write-Host "Bootstrapping SQL Database..."
          Write-Host "  SQL Server: $sqlServerName"
          Write-Host "  Database: $sqlDatabaseName"
          
          # Execute bootstrap script with error handling
          try {
            & ./scripts/bootstrap-sql-managed-identity.ps1 `
              -AppServiceName "${{ env.AZURE_WEBAPP_NAME }}" `
              -SqlServerName $sqlServerName `
              -SqlDatabaseName $sqlDatabaseName `
              -ResourceGroup "${{ env.AZURE_RESOURCE_GROUP }}" `
              -SubscriptionId "${{ env.AZURE_SUBSCRIPTION_ID }}"
            
            if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: SQL bootstrap script failed with exit code $LASTEXITCODE" -ForegroundColor Red
              exit 1
            }
            Write-Host "✓ SQL bootstrap completed successfully" -ForegroundColor Green
          }
          catch {
            Write-Host "ERROR: SQL bootstrap failed - $_" -ForegroundColor Red
            exit 1
          }

      - name: Close SQL firewall after deployment
        if: always()
        run: |
          SQL_SERVER="sql-capdash-prod-prod01"
          az sql server firewall-rule delete \
            --name github-actions-temp \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server $SQL_SERVER \
            --output none 2>/dev/null || true
          az sql server update \
            --name $SQL_SERVER \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --set publicNetworkAccess=Disabled \
            --output none
          echo "✓ SQL firewall closed"

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }}
          echo "✓ App restarted successfully"

      - name: Wait for App Service to be ready
        shell: pwsh
        run: |
          $appUrl = "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          $maxAttempts = 30
          $attempt = 0
          
          Write-Host "Waiting for app to be responsive at $appUrl..."
          
          while ($attempt -lt $maxAttempts) {
            try {
              $response = Invoke-WebRequest -Uri $appUrl -UseBasicParsing -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                Write-Host "✓ App is responsive (HTTP $($response.StatusCode))" -ForegroundColor Green
                exit 0
              }
            }
            catch {
              $attempt++
              if ($attempt -lt $maxAttempts) {
                Write-Host "Attempt $attempt/$maxAttempts: App not ready yet, retrying in 2 seconds..."
                Start-Sleep -Seconds 2
              }
            }
          }
          
          Write-Host "ERROR: App did not become responsive after $maxAttempts attempts" -ForegroundColor Red
          exit 1

      - name: Verify deployment
        run: |
          echo "✓ Deployment completed successfully"
          echo "App URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "SQL managed identity configured and app is running"

  deploy-manual:
    runs-on: ubuntu-latest
    environment: production
