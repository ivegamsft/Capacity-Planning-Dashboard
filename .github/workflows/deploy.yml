name: Deploy Capacity Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_LOCATION: 'westus2'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create deployment package
        run: |
          mkdir -p deployment
          cp package.json deployment/
          cp package-lock.json deployment/ 2>/dev/null || true
          cp server.js deployment/
          cp app.js deployment/
          cp index.html deployment/
          cp styles.css deployment/
          cp web.config deployment/ 2>/dev/null || true
          cp -r react deployment/ 2>/dev/null || true
          cp -r src deployment/ 2>/dev/null || true
          cp -r tools deployment/ 2>/dev/null || true
          cd deployment
          zip -r ../deployment.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deployment.zip
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          slot-name: 'production'

      - name: Verify deployment
        run: |
          echo "Deployment completed successfully"
          echo "App URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"

  deploy-manual:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Create deployment package
        run: |
          mkdir -p deployment
          cp package.json deployment/
          cp package-lock.json deployment/ 2>/dev/null || true
          cp server.js deployment/
          cp app.js deployment/
          cp index.html deployment/
          cp styles.css deployment/
          cp web.config deployment/ 2>/dev/null || true
          cp -r react deployment/ 2>/dev/null || true
          cp -r src deployment/ 2>/dev/null || true
          cp -r tools deployment/ 2>/dev/null || true
          cd deployment
          zip -r ../deployment.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deployment.zip
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          slot-name: 'production'

      - name: Post-deployment verification
        run: |
          echo "Manual deployment to ${{ github.event.inputs.environment }} completed"
          echo "App URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
